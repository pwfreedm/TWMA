<!DOCTYPE html>
<html>
<head>
    <title>Form Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='form.css') }}">
</head>
<body>
    <h2>Settings</h2>

    <form action="{{ url_for('update') }}" method="POST">
        <input type="text", name="form_id", value="settings" hidden>

        <label>Database Filepath:</label>
        <input type="text" name="db_path" placeholder="{{ db_path }}"><br><br>

        <label>Output Filepath:</label>
        <input type="text" name="out_path" placeholder="{{ out_path }}"><br><br>

        <label>Create New Filepaths?</label>
        <input type ="checkbox" name="create_fps" checked><br><br>

        <label>Cleanup After Moving?</label>
        <input type = "checkbox" name="remove_old" checked><br><br>

        <button type="update">Update</button>
    </form>
</body>
</html>
