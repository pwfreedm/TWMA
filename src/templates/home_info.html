<!DOCTYPE html>
<html>
<head>
    <title>Form Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='form.css') }}">
</head>
<body>
    <h2>Home Euthanasia Info</h2>

    <form action="{{ url_for('submit') }}" method="POST">
        <label>Client:</label>
        <input type="text" name="client" required><br><br>

        <label>Phone:</label>
        <input type="tel" name="phone"><br><br>

        <label>Email:</label>
        <input type="email" name="email"><br><br>

        <label>Scheduled Date:</label>
        <input type="date" name="date" id="date">

        <label>Time:</label>
        <input type="time" name="time"><br><br>

        <label>Address:</label>
        <input type="text" name="address"><br><br>

        <label>City:</label>
        <input type="text" name="city"><br><br>

        <label>State:</label>
        <input type="text" name="state" value="PA">

        <label>Zip:</label>
        <input type="text" name="zip"><br><br>

        <input type="radio" id="none" name="travel" value="none" checked>
        <label for="none">No Fee</label>
        <input type="radio" id="short" name="travel" value="55">
        <label for="short">$55</label>
        <input type="radio" id="long" name="travel" value="65">
        <label for="long">$65</label><br><br><br><br>

        <label>Patient:</label>
        <input type="text" name="patient" required>

        <input type="radio" id="cat" name="animal" value="cat" checked>
        <label for="cat">Cat</label>
        <input type="radio" id="dog" name="animal" value="dog">
        <label for="dog">Dog</label>
        <input type="radio" id="other" name="animal" value="other">
        <label for="other">Other</label><br><br>
        
        <label>Age:</label>
        <input type="number" name="age"><br><br>

        <label>Gender:</label>
        <input type="text" name="sex">

        <label>Breed:</label>
        <input type="text" name="breed"><br><br>

        <label>Weight:</label>
        <input type="number" name="weight"><br><br>

        <label>Local Vet:</label>
        <input type="text" name="vet"><br><br>

        <input type="radio" id="home" name="disposal" value="home" checked>
        <label for="home">Home</label>
        <input type="radio" id="private" name="disposal" value="private">
        <label for="private">Private</label>
        <input type="radio" id="communal" name="disposal" value="disposal">
        <label for="communal">Communal</label><br><br>

        <label>Number of Paw Prints:</label><br>
        <input type="number" name="prints"><br><br>

        <label>Notes:</label><br>
        <textarea name="notes"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
    <script src="{{ url_for('static', filename='js/no-scroll.js') }}"></script>
    <script src="{{ url_for('static', filename='js/date.js') }}"></script>
</body>
</html>
